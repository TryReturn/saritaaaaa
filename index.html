<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Cartica pa mi Sarita</title>

    <!-- Fuente bonita -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #fbc2eb, #a6c1ee);
            font-family: 'Poppins', sans-serif;
        }

        .carta {
            width: 340px;
            height: 220px;
            background: #fff;
            border-radius: 15px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.25);
            position: relative;
            cursor: pointer;
            overflow: hidden;
            transition: transform 0.5s;
        }

        .carta:hover {
            transform: scale(1.06);
        }

        .tapa {
            position: absolute;
            top: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #ff9a9e, #fad0c4);
            clip-path: polygon(0 0, 100% 0, 50% 65%);
            transition: transform 0.9s ease;
            transform-origin: top;
            z-index: 2;
        }

        .carta.abierta .tapa {
            transform: rotateX(180deg);
        }

        .contenido {
            position: absolute;
            inset: 0;
            padding: 25px;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-size: 18px;
            color: #555;
            opacity: 0;
            transition: opacity 1s ease 0.5s;
        }

        .contenido strong {
            font-size: 20px;
            color: #e75480;
            margin-bottom: 10px;
        }

        .carta.abierta .contenido {
            opacity: 1;
        }

        .indicacion {
            position: absolute;
            bottom: -45px;
            width: 100%;
            text-align: center;
            font-size: 14px;
            color: #444;
            animation: flotar 1.5s infinite;
        }

        @keyframes flotar {
            0% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
            100% { transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="carta" onclick="abrirCarta()">
        <div class="tapa"></div>

        <div class="contenido">
            <strong>Para mi Sarita 💖</strong>
            Gracias Hadita por ser mi amiga.<br>
            Recuerda que te quiero mucho.
        </div>

        <div class="indicacion">
            Toca la carta 💌
        </div>
    </div>

    <script>
        function abrirCarta() {
            document.querySelector('.carta').classList.toggle('abierta');
        }
    </script>

</body>
</html>
