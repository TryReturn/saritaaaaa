<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>cartica pa mi sarita</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #fbc2eb, #a6c1ee);
            font-family: Arial, sans-serif;
        }

        .carta {
            width: 300px;
            height: 200px;
            background: #fff;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            position: relative;
            cursor: pointer;
            overflow: hidden;
            transition: transform 0.6s;
        }

        .carta:hover {
            transform: scale(1.05);
        }

        .tapa {
            position: absolute;
            top: 0;
            width: 100%;
            height: 100%;
            background: #ffb6c1;
            clip-path: polygon(0 0, 100% 0, 50% 60%);
            transition: transform 0.8s;
            transform-origin: top;
            z-index: 2;
        }

        .carta.abierta .tapa {
            transform: rotateX(180deg);
        }

        .contenido {
            position: absolute;
            inset: 0;
            padding: 20px;
            text-align: center;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 18px;
            color: #444;
            opacity: 0;
            transition: opacity 1s 0.5s;
        }

        .carta.abierta .contenido {
            opacity: 1;
        }

        .indicacion {
            position: absolute;
            bottom: -40px;
            width: 100%;
            text-align: center;
            font-size: 14px;
            color: #333;
        }
    </style>
</head>
<body>

    <div class="carta" onclick="abrirCarta()">
        <div class="tapa"></div>
        <div class="contenido">
            Gracias Hadita por ser mi amiga, recuerda <br>
            que te quiero mucho
        </div>
        <div class="indicacion">
            dame like
        </div>
    </div>

    <script>
        function abrirCarta() {
            document.querySelector('.carta').classList.toggle('abierta');
        }
    </script>

</body>
</html>
